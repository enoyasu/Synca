name: Synca
options:
  bundleIdPrefix: com.synca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_PREVIEWS: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "4SBW8J6Y96"
    CODE_SIGN_STYLE: Automatic

targets:
  Synca:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Synca
        excludes:
          - "**/*.md"
          - "Resources/Info.plist"
    info:
      path: Synca/Resources/Info.plist
      properties:
        CFBundleDisplayName: Synca
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        UIRequiresFullScreen: true
        NSMotionUsageDescription: Syncaはキャラクターのインタラクションに端末の動きを使用します。加速度センサーとジャイロスコープで、あなたの動きに合わせてキャラクターが反応します。
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchScreen:
          UIColorName: AccentColor
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
        GADApplicationIdentifier: "ca-app-pub-3940256099942544~1458002511"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.synca.app
        INFOPLIST_FILE: Synca/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: YES
    scheme:
      testTargets:
        - SyncaTests
      gatherCoverageData: true

  SyncaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SyncaTests
    dependencies:
      - target: Synca
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.synca.app.tests
        GENERATE_INFOPLIST_FILE: YES
