name: Synca
options:
  bundleIdPrefix: com.synca
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: 5.9
    ENABLE_PREVIEWS: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

targets:
  Synca:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Synca
        excludes:
          - "**/*.md"
    info:
      path: Synca/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.synca.app
        INFOPLIST_FILE: Synca/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_ENTITLEMENTS: Synca/Synca.entitlements
    entitlements:
      path: Synca/Synca.entitlements
      properties:
        com.apple.developer.in-app-payments:
          - com.synca.app.removeads
          - com.synca.app.character.hana
          - com.synca.app.character.riku
          - com.synca.app.character.sora
    scheme:
      testTargets:
        - SyncaTests
      gatherCoverageData: true

  SyncaTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SyncaTests
    dependencies:
      - target: Synca
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.synca.app.tests
